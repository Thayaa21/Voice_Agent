<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Voice AI — Live Operations Center</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#070b14;--panel:#0d1117;--border:#1c2333;--border2:#21262d;
    --text:#e6edf3;--muted:#7d8590;--accent:#58a6ff;--green:#3fb950;
    --red:#f85149;--yellow:#d29922;--purple:#bc8cff;--orange:#ffa657;
    --card:#161b22;--card2:#1c2128;
  }
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
  
  /* TOP BAR */
  .topbar{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;color:var(--text)}
  .logo svg{width:28px;height:28px}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(63,185,80,.4)}50%{box-shadow:0 0 0 8px rgba(63,185,80,0)}}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:20px}
  .service-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:4px 10px;border:1px solid var(--border2);border-radius:20px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
  .dot.off{background:var(--red)}
  .call-badge{background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.3);color:var(--red);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;display:none}
  .call-badge.active{display:flex;align-items:center;gap:6px;animation:flash 1s infinite}
  @keyframes flash{0%,100%{opacity:1}50%{opacity:0.6}}

  /* LAYOUT */
  .layout{display:grid;grid-template-columns:280px 1fr 320px;gap:0;flex:1;overflow:hidden}
  
  /* PANELS */
  .panel{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
  .panel:last-child{border-right:none;border-left:1px solid var(--border)}
  .panel-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;flex-shrink:0}
  .panel-body{flex:1;overflow-y:auto;padding:12px}
  
  /* MAIN CENTER */
  .main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
  .main-top{flex:1;overflow-y:auto;padding:20px}
  .main-bottom{border-top:1px solid var(--border);background:var(--panel);flex-shrink:0}
  
  /* PATIENT CARDS */
  .patient-card{border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s;background:var(--card)}
  .patient-card:hover{border-color:var(--accent);background:var(--card2)}
  .patient-card.active{border-color:var(--accent);background:rgba(88,166,255,.08)}
  .p-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
  .p-meta{font-size:11px;color:var(--muted);margin-bottom:8px}
  .tags{display:flex;gap:5px;flex-wrap:wrap}
  .tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;letter-spacing:.02em}
  .tag-blue{background:rgba(88,166,255,.12);color:var(--accent);border:1px solid rgba(88,166,255,.2)}
  .tag-red{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.2)}
  .tag-green{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.2)}
  .tag-purple{background:rgba(188,140,255,.12);color:var(--purple);border:1px solid rgba(188,140,255,.2)}

  /* PATIENT RECORD */
  .record-empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .record-empty .icon{font-size:48px;margin-bottom:16px;opacity:.4}
  .record-header{background:linear-gradient(135deg,rgba(88,166,255,.08),rgba(188,140,255,.08));border:1px solid rgba(88,166,255,.2);border-radius:10px;padding:20px;margin-bottom:16px}
  .r-name{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
  .r-meta{font-size:13px;color:var(--muted);margin-bottom:12px}
  .r-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .stat{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:6px;padding:10px;text-align:center}
  .stat-val{font-size:20px;font-weight:700;margin-bottom:2px}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .info-card{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:14px}
  .info-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .info-body{font-size:13px;color:var(--text);line-height:1.6}

  /* LIVE FEED */
  .feed-item{padding:10px 12px;border-radius:6px;margin-bottom:6px;border-left:3px solid transparent;font-size:13px;background:var(--card);line-height:1.5;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .feed-item.transcript{border-color:var(--accent);background:rgba(88,166,255,.05)}
  .feed-item.patient_found{border-color:var(--green);background:rgba(63,185,80,.05)}
  .feed-item.agent{border-color:var(--purple);background:rgba(188,140,255,.05)}
  .feed-item.insurance{border-color:var(--yellow);background:rgba(210,153,34,.05)}
  .feed-item.error{border-color:var(--red);background:rgba(248,81,73,.05)}
  .feed-item.callback{border-color:var(--orange);background:rgba(255,166,87,.05)}
  .feed-meta{font-size:10px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:8px}
  .feed-label{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
  .lbl-transcript{background:rgba(88,166,255,.15);color:var(--accent)}
  .lbl-agent{background:rgba(188,140,255,.15);color:var(--purple)}
  .lbl-insurance{background:rgba(210,153,34,.15);color:var(--yellow)}
  .lbl-system{background:rgba(63,185,80,.15);color:var(--green)}
  .lbl-callback{background:rgba(255,166,87,.15);color:var(--orange)}

  /* INSURANCE PANEL */
  .ins-status{text-align:center;padding:30px 16px;color:var(--muted)}
  .ins-status .icon{font-size:36px;margin-bottom:12px;opacity:.5}
  .ins-phase{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:8px;animation:fadeIn .3s ease}
  .ins-phase-icon{font-size:16px;margin-right:8px}
  .ins-phase-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px}
  .ins-phase-body{font-size:12px;color:var(--muted);line-height:1.5}
  .ins-response{background:linear-gradient(135deg,rgba(210,153,34,.06),rgba(255,166,87,.06));border:1px solid rgba(210,153,34,.2);border-radius:8px;padding:14px;margin-top:12px}
  .ins-response-title{font-size:10px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
  .ins-response-body{font-size:13px;color:var(--text);line-height:1.6}
  .status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:10px}
  .badge-denied{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.25)}
  .badge-paid{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.25)}
  .badge-pending{background:rgba(210,153,34,.15);color:var(--yellow);border:1px solid rgba(210,153,34,.25)}

  /* TRANSCRIPT BAR */
  .transcript-bar{padding:14px 16px;display:flex;align-items:center;gap:12px}
  .waveform{display:flex;align-items:center;gap:2px;height:24px}
  .wave-bar{width:3px;border-radius:2px;background:var(--accent);opacity:.3;animation:wave 1.2s ease-in-out infinite}
  .wave-bar:nth-child(1){height:8px;animation-delay:.0s}
  .wave-bar:nth-child(2){height:16px;animation-delay:.15s}
  .wave-bar:nth-child(3){height:24px;animation-delay:.3s}
  .wave-bar:nth-child(4){height:16px;animation-delay:.45s}
  .wave-bar:nth-child(5){height:8px;animation-delay:.6s}
  @keyframes wave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
  .waveform.active .wave-bar{opacity:1}
  .transcript-text{font-size:14px;color:var(--muted);font-style:italic;flex:1}
  .transcript-text.speaking{color:var(--text);font-style:normal}
  .call-timer{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:.05em}

  /* NOTES */
  .note-item{background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:10px;margin-bottom:6px;font-size:12px;color:var(--text);line-height:1.5}
  .note-time{font-size:10px;color:var(--muted);margin-bottom:3px;font-family:'JetBrains Mono',monospace}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

  /* GLOW EFFECTS */
  .glow-green{box-shadow:0 0 20px rgba(63,185,80,.15)}
  .glow-blue{box-shadow:0 0 20px rgba(88,166,255,.15)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="rgba(88,166,255,.15)"/><path d="M14 6v4M14 18v4M6 14h4M18 14h4" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="14" r="4" fill="#58a6ff" opacity=".6"/></svg>
    Hospital Voice AI
  </div>
  <span style="color:var(--muted);font-size:13px">Operations Center</span>
  <div class="call-badge" id="call-badge">
    <div class="pulse"></div>
    <span id="call-badge-text">CALL ACTIVE</span>
  </div>
  <div class="topbar-right" id="service-pills"></div>
  <button id="audio-btn" onclick="toggleAudio()" style="background:rgba(63,185,80,.15);border:1px solid rgba(63,185,80,.3);color:var(--green);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;margin-left:12px">🔊 Audio On</button>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- LEFT: DEMO PATIENTS -->
  <div class="panel">
    <div class="panel-header">Demo Patients</div>
    <div class="panel-body" id="patient-list"></div>
  </div>

  <!-- CENTER: MAIN -->
  <div class="main">
    <div class="main-top" id="main-content">
      <div class="record-empty">
        <div class="icon">🏥</div>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Waiting for call...</div>
        <div style="font-size:13px">Select a demo patient or place a real call to <strong style="color:var(--accent)">+1 (531) 324-5471</strong></div>
      </div>
    </div>
    <div class="main-bottom">
      <div class="transcript-bar">
        <div class="waveform" id="waveform">
          <div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>
        <div class="transcript-text" id="last-transcript">Waiting for speech...</div>
        <div class="call-timer" id="call-timer" style="display:none">00:00</div>
      </div>
    </div>
  </div>

  <!-- RIGHT: LIVE FEED + INSURANCE -->
  <div class="panel" style="border-left:1px solid var(--border)">
    <div class="panel-header" style="display:flex;justify-content:space-between;align-items:center">
      <span>Live Event Feed</span>
      <span id="event-count" style="color:var(--accent);font-size:10px">0 events</span>
    </div>
    <div class="panel-body" id="live-feed" style="padding:8px"></div>
    <div class="panel-header" style="border-top:1px solid var(--border);border-bottom:1px solid var(--border)">Insurance Agent</div>
    <div style="flex:1;overflow-y:auto;padding:12px" id="insurance-panel">
      <div class="ins-status">
        <div class="icon">🏢</div>
        <div style="font-size:12px">Insurance agent idle</div>
        <div style="font-size:11px;margin-top:4px">Will activate when 3-phase resolution starts</div>
      </div>
    </div>
  </div>

</div>

<script>
const AGENT_URL = 'http://localhost:9001';
const GRAPH_URL = 'http://localhost:8000';
const INS_URL   = 'http://localhost:8002';
const WS_URL    = 'ws://localhost:9001/ws';

const DEMO_PATIENTS = [
  {
    name: 'Ruby Hall',
    insurance: 'Cigna Health',
    dob: '1966-07-06',
    denied: 94,
    conditions: 14,
    scenario: 'Claim Denial',
    details: {
      claim: 'Ruby Hall, your Encounter for check up claim from 2019-06-05 was denied — prior auth not obtained. Billed: $129.16, covered: $0. Appeal by submitting prior auth to Cigna Health. 94 total denied claims.',
      cost: 'Ruby Hall, billing with Cigna Health: total billed $14,672.57, covered $2,111.53, your responsibility $12,561.04. 94 denied claims may be adding to balance.',
      bill: 'Ruby Hall: $14,672.57 billed, Cigna paid $2,111.53, you owe $12,561.04. $2,454.04 from 19 denied claims. We offer payment plans.',
      prep: 'Do not eat or drink after midnight. Bring ID, insurance card, medication list. Arrange a driver if sedation is used. Arrive 30 min early.',
      phone_script: 'Say: "Ruby Hall, date of birth July 6, 1966"'
    }
  },
  {
    name: 'Elena Garcia',
    insurance: 'Humana',
    dob: '1969-07-16',
    denied: 69,
    conditions: 9,
    scenario: 'Cost Estimate',
    details: {
      claim: 'Elena Garcia, your Encounter for check up claim from 2019-05-29 was denied — prior auth not obtained. Billed: $129.16, covered: $0. Appeal via Humana prior auth request. 69 total denied claims.',
      cost: 'Elena Garcia, billing with Humana: total billed $14,724.24, covered $3,367.20, your responsibility $11,357.04. 69 denied claims adding to balance.',
      bill: 'Elena Garcia: $14,724.24 billed, Humana paid $3,367.20, you owe $11,357.04. Denied claims contributing to balance. Payment plans available.',
      prep: 'Do not eat or drink after midnight. Bring ID, insurance card, medication list. Arrange a driver if sedation is used. Arrive 30 min early.',
      phone_script: 'Say: "Elena Garcia, date of birth July 16, 1969"'
    }
  },
];

let ws = null, eventCount = 0, callTimer = null, callSeconds = 0;
let activePatient = null, notes = [];

// ── WebSocket ──────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => { updateServicePill('Agent WS', true); };
  ws.onclose = () => { updateServicePill('Agent WS', false); setTimeout(connectWS, 3000); };
  ws.onerror = () => { updateServicePill('Agent WS', false); };
  ws.onmessage = (e) => {
    try { handleEvent(JSON.parse(e.data)); } catch(err) { console.error(err); }
  };
}

function handleEvent(ev) {
  eventCount++;
  document.getElementById('event-count').textContent = eventCount + ' events';

  const { type, timestamp, data } = ev;

  switch(type) {
    case 'call_started':
      startCallTimer();
      document.getElementById('call-badge').className = 'call-badge active';
      addFeed('📞 Inbound call received', 'system', timestamp);
      break;

    case 'transcript':
      document.getElementById('last-transcript').textContent = data.text;
      document.getElementById('last-transcript').className = 'transcript-text speaking';
      document.getElementById('waveform').classList.add('active');
      addFeed(`"${data.text}"`, 'transcript', timestamp, data.state);
      setTimeout(() => {
        document.getElementById('waveform').classList.remove('active');
        document.getElementById('last-transcript').className = 'transcript-text';
      }, 2000);
      break;

    case 'searching':
      addFeed(`🔍 Searching graph for: "${data.query}"`, 'system', timestamp);
      break;

    case 'patient_identified':
      addFeed(`✅ Patient identified: ${data.person}`, 'patient_found', timestamp);
      addNote(`Patient verified: ${data.person}`);
      break;

    case 'patient_not_found':
      addFeed('❌ Patient not found in records', 'error', timestamp);
      break;

    case 'patient_record':
      renderPatientRecord(data);
      break;

    case 'tool_called':
      const intentLabels = {
        claim_status:'Prior Auth / Claim Denial', cost_estimate:'Out-of-Pocket Estimate',
        pre_procedure:'Pre-Procedure Prep', bill_explain:'Bill Explanation', general:'General Query'
      };
      addFeed(`🔧 Tool: ${intentLabels[data.intent] || data.intent}`, 'system', timestamp);
      break;

    case 'tool_result':
      addNote(`${data.intent}: ${data.answer.substring(0,120)}...`);
      break;

    case 'agent_response':
      addFeed(data.text.substring(0,120) + (data.text.length > 120 ? '...' : ''), 'agent', timestamp);
      break;

    case 'insurance_calling':
      // Clear insurance panel for fresh conversation
      document.getElementById('insurance-panel').innerHTML = '';
      addInsuranceConvo('System', `📞 Initiating call to Pacific Shield Insurance for ${data.patient_name}...`, 'ivr');
      addFeed('📞 Initiating 3-Phase Resolution — calling insurance', 'insurance', timestamp);
      if(audioEnabled) speak('Dialing Pacific Shield Insurance. Please wait.', hospitalVoice, 0.95);
      break;

    case 'insurance_ivr':
      addInsuranceConvo('IVR System', data.message, 'ivr');
      addFeed('🔢 ' + data.message, 'insurance', timestamp);
      if(audioEnabled) setTimeout(() => speak(data.message, insuranceVoice, 0.85, 0.88), 500);
      break;

    case 'insurance_agent_speaks':
      addInsuranceConvo('Hospital Agent', data.message, 'hospital');
      addFeed('🏥 Hospital: ' + data.message.substring(0,80), 'system', timestamp);
      if(audioEnabled) setTimeout(() => speak(data.message, hospitalVoice, 1.0, 1.05), 300);
      break;

    case 'insurance_hold':
      addInsuranceConvo('IVR System', data.message, 'ivr');
      addFeed('🎵 ' + data.message, 'insurance', timestamp);
      if(audioEnabled) setTimeout(() => speak(data.message, insuranceVoice, 0.82, 0.85), 500);
      break;

    case 'insurance_connected':
      addInsuranceConvo('Sarah (Insurance Agent)', data.message, 'insurance');
      addFeed('☎️ Insurance agent answered', 'insurance', timestamp);
      if(audioEnabled) setTimeout(() => speak(data.message, insuranceVoice, 0.92, 0.95), 300);
      break;

    case 'insurance_response':
      addInsuranceConvo('Sarah (Insurance Agent)', data.agent_response, 'insurance');
      addFeed(`✅ Insurance: ${data.summary||data.claim_status}`, 'insurance', timestamp);
      addNote(`Insurance verdict: ${data.summary||data.claim_status}`);
      if(audioEnabled && data.agent_response) {
        setTimeout(() => speak(data.agent_response, insuranceVoice, 0.9, 0.93), 300);
      }
      break;

    case 'callback_initiated':
      addFeed(`📱 Calling patient back at ${data.callback_number}`, 'callback', timestamp);
      addNote(`Callback initiated: ${data.callback_message.substring(0,100)}...`);
      if(audioEnabled) setTimeout(() => speak('Calling patient back now with the full insurance response.', hospitalVoice, 0.95), 500);
      break;

    case 'three_phase_queued':
      addFeed(`🔄 3-Phase resolution queued for ${data.person} — calling insurance now`, 'system', timestamp);
      addNote(`3-phase triggered: will call insurance then call patient back`);
      break;

    case 'call_ended':
      stopCallTimer();
      document.getElementById('call-badge').className = 'call-badge';
      addFeed(`📴 Call ended${data.person ? ' — ' + data.person : ''}`, 'system', timestamp);
      break;
  }
}
</script>

<script>
// ── Feed ──────────────────────────────────────────────────────────────────
function addFeed(text, type, time, sub) {
  const feed = document.getElementById('live-feed');
  const labels = {transcript:'lbl-transcript',agent:'lbl-agent',insurance:'lbl-insurance',system:'lbl-system',patient_found:'lbl-system',callback:'lbl-callback',error:'lbl-agent'};
  const names  = {transcript:'PATIENT',agent:'AGENT',insurance:'INSURANCE',system:'SYSTEM',patient_found:'MATCH',callback:'CALLBACK',error:'ERROR'};
  const typeClass = {transcript:'transcript',patient_found:'patient_found',agent:'agent',insurance:'insurance',error:'error',callback:'callback'};
  const div = document.createElement('div');
  div.className = `feed-item ${typeClass[type] || ''}`;
  div.innerHTML = `<div class="feed-meta"><span class="feed-label ${labels[type]||'lbl-system'}">${names[type]||type.toUpperCase()}</span><span>${time||''}</span>${sub?`<span style="color:var(--muted)">${sub}</span>`:''}</div>${text}`;
  feed.prepend(div);
  if(feed.children.length > 50) feed.removeChild(feed.lastChild);
}

// ── Notes ─────────────────────────────────────────────────────────────────
function addNote(text) {
  notes.push({text, time: new Date().toLocaleTimeString()});
  const notesEl = document.getElementById('call-notes');
  if(!notesEl) return;
  const div = document.createElement('div');
  div.className = 'note-item';
  div.innerHTML = `<div class="note-time">${notes[notes.length-1].time}</div>${text}`;
  notesEl.prepend(div);
}

// ── Patient Record ─────────────────────────────────────────────────────────
function renderPatientRecord(data) {
  const {person, record} = data;
  const p = DEMO_PATIENTS.find(x => x.name === person) || {};
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="record-header glow-blue">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="width:44px;height:44px;background:rgba(88,166,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px">👤</div>
        <div>
          <div class="r-name">${person}</div>
          <div class="r-meta">${p.insurance||'Unknown'} · DOB: ${p.dob||''} · <span style="color:var(--accent)">${p.phone_script||''}</span></div>
        </div>
        <div style="margin-left:auto"><span class="tag tag-green">✓ VERIFIED</span></div>
      </div>
      <div style="background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.15);border-radius:6px;padding:10px;font-size:12px;color:var(--accent)">
        📞 <strong>Phone script:</strong> ${p.details?.phone_script || 'Say the patient name and date of birth'}
      </div>
    </div>

    <!-- CHEAT SHEET - what to say on the phone -->
    <div style="background:rgba(63,185,80,.04);border:1px solid rgba(63,185,80,.2);border-radius:8px;padding:14px;margin-bottom:16px">
      <div style="font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:12px">📋 What You Can Ask On The Phone</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="background:rgba(0,0,0,.3);border-radius:6px;padding:10px">
          <div style="font-size:10px;color:var(--yellow);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">🚫 Claim / Denial</div>
          <div style="font-size:11px;color:var(--text);line-height:1.5">"Why was my claim denied?"<br>"What's my claim status?"</div>
        </div>
        <div style="background:rgba(0,0,0,.3);border-radius:6px;padding:10px">
          <div style="font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">💰 Cost</div>
          <div style="font-size:11px;color:var(--text);line-height:1.5">"How much will I owe?"<br>"What's my out-of-pocket?"</div>
        </div>
        <div style="background:rgba(0,0,0,.3);border-radius:6px;padding:10px">
          <div style="font-size:10px;color:var(--purple);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">📋 Pre-Procedure</div>
          <div style="font-size:11px;color:var(--text);line-height:1.5">"What do I do before my procedure?"<br>"Should I stop my medication?"</div>
        </div>
        <div style="background:rgba(0,0,0,.3);border-radius:6px;padding:10px">
          <div style="font-size:10px;color:var(--orange);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">🧾 Bill</div>
          <div style="font-size:11px;color:var(--text);line-height:1.5">"I got a bill — why do I owe this?"<br>"Explain my statement"</div>
        </div>
      </div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="info-title">🚫 Claim Status</div>
        <div class="info-body" style="font-size:12px">${p.details?.claim || record.claim_status || 'Loading...'}</div>
      </div>
      <div class="info-card">
        <div class="info-title">💰 Cost Estimate</div>
        <div class="info-body" style="font-size:12px">${p.details?.cost || record.cost_estimate || 'Loading...'}</div>
      </div>
      <div class="info-card">
        <div class="info-title">📋 Pre-Procedure</div>
        <div class="info-body" style="font-size:12px">${p.details?.prep || record.pre_procedure || 'Loading...'}</div>
      </div>
      <div class="info-card">
        <div class="info-title">🧾 Bill Explanation</div>
        <div class="info-body" style="font-size:12px">${p.details?.bill || 'Loading...'}</div>
      </div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:14px">
      <div class="info-title">📝 Live Call Notes</div>
      <div id="call-notes" style="margin-top:8px;font-size:12px;color:var(--muted)">Notes will appear here as the call progresses...</div>
    </div>

    <div style="margin-top:12px;display:flex;gap:10px">
      <button onclick="triggerThreePhase('${person}')" style="flex:1;background:linear-gradient(135deg,#805ad5,#553c9a);color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .2s" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
        🔄 Trigger 3-Phase Insurance Resolution
      </button>
    </div>
  `;
  notes.forEach(n => {
    const el = document.getElementById('call-notes');
    if(el) { el.style.color='var(--text)'; const d=document.createElement('div'); d.className='note-item'; d.innerHTML=`<div class="note-time">${n.time}</div>${n.text}`; el.appendChild(d); }
  });
}

// ── Insurance Panel ────────────────────────────────────────────────────────
let insurancePhases = [];
function renderInsurancePhase(phase, data) {
  const panel = document.getElementById('insurance-panel');
  const icons = {calling:'📞',ivr:'🔢',hold:'🎵',connected:'☎️'};
  const titles = {calling:'Dialing Insurance',ivr:'Navigating IVR',hold:'On Hold',connected:'Agent Answered'};
  insurancePhases.push({phase, data});
  panel.innerHTML = insurancePhases.map(p => `
    <div class="ins-phase">
      <div class="ins-phase-icon">${icons[p.phase]||'•'}</div>
      <div style="display:inline;font-weight:600;font-size:12px;color:var(--text)">${titles[p.phase]||p.phase}</div>
      <div class="ins-phase-body">${p.data.message||''}</div>
    </div>
  `).join('') + `<div id="ins-response-area"></div>`;
}

function renderInsuranceResponse(data) {
  const statusClass = {DENIED_NO_PA:'badge-denied',PAID:'badge-paid',PENDING_P2P:'badge-pending',PARTIAL:'badge-pending'}[data.claim_status]||'badge-pending';
  const area = document.getElementById('ins-response-area');
  if(area) area.innerHTML = `
    <div class="ins-response">
      <div class="ins-response-title">Insurance Agent Response</div>
      <span class="status-badge ${statusClass}">${data.claim_status||'UNKNOWN'}</span>
      <div class="ins-response-body">${data.agent_response||''}</div>
    </div>
  `;
}

// ── 3-Phase trigger ────────────────────────────────────────────────────────
async function triggerThreePhase(patientName) {
  insurancePhases = [];
  addFeed('🔄 Starting 3-Phase Resolution...', 'system', new Date().toLocaleTimeString());
  try {
    await fetch(`${AGENT_URL}/resolve`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({patient_name:patientName, inquiry_type:'claim_status', callback_number:'+15313245471', call_id:'dashboard_'+Date.now()})
    });
  } catch(e) { addFeed('Error: ' + e.message, 'error', ''); }
}
</script>

<script>
// ── Demo patient simulation ────────────────────────────────────────────────
async function loadDemoPatient(idx) {
  document.querySelectorAll('.patient-card').forEach(c => c.classList.remove('active'));
  document.getElementById('pc-'+idx).classList.add('active');
  const p = DEMO_PATIENTS[idx];
  activePatient = p;
  notes = [];
  insurancePhases = [];
  const callId = 'demo_' + Date.now();

  // Simulate call start
  handleEvent({type:'call_started', timestamp: new Date().toLocaleTimeString(), data:{call_id:callId}});
  await sleep(500);
  handleEvent({type:'transcript', timestamp:now(), data:{text:p.name, call_id:callId, state:'verify_identity'}});

  // Call agent
  const r1 = await fetch(`${AGENT_URL}/agent`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:p.name,call_id:callId})});
  const d1 = await r1.json();
  handleEvent({type:'agent_response', timestamp:now(), data:{text:d1.response, call_id:callId}});
  await sleep(800);

  // Ask about claim
  const questions = {
    'Claim Denial': 'why was my claim denied',
    'Cost Estimate': 'how much will I owe for my procedure',
    'Pre-Procedure': 'what do I need to do before my procedure'
  };
  const q = questions[p.scenario] || 'tell me about my account';
  handleEvent({type:'transcript', timestamp:now(), data:{text:q, call_id:callId, state:'answering'}});
  const r2 = await fetch(`${AGENT_URL}/agent`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:q,call_id:callId})});
  const d2 = await r2.json();
  handleEvent({type:'agent_response', timestamp:now(), data:{text:d2.response, call_id:callId}});
}

// ── Speech synthesis (hear the insurance call) ────────────────────────────
const synth = window.speechSynthesis;
let hospitalVoice = null, insuranceVoice = null;

function loadVoices() {
  const voices = synth.getVoices();
  // Hospital agent — female, US English
  hospitalVoice = voices.find(v => v.name.includes('Samantha') || v.name.includes('Karen') || (v.lang === 'en-US' && v.name.includes('Female'))) || voices.find(v => v.lang === 'en-US') || voices[0];
  // Insurance agent — different voice, slightly different character
  insuranceVoice = voices.find(v => v.name.includes('Alex') || v.name.includes('Daniel') || (v.lang === 'en-US' && !v.name.includes('Samantha'))) || voices.find(v => v.lang === 'en-US') || voices[0];
}

if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = loadVoices;
}
setTimeout(loadVoices, 500);

function speak(text, voice, rate = 1.0, pitch = 1.0) {
  synth.cancel(); // stop any current speech
  const utt = new SpeechSynthesisUtterance(text);
  utt.voice = voice;
  utt.rate  = rate;
  utt.pitch = pitch;
  utt.volume = 1.0;
  synth.speak(utt);
}

let audioEnabled = true;

function toggleAudio() {
  audioEnabled = !audioEnabled;
  document.getElementById('audio-btn').textContent = audioEnabled ? '🔊 Audio On' : '🔇 Audio Off';
  if (!audioEnabled) synth.cancel();
}
// ── Insurance conversation (chat style) ───────────────────────────────────
function addInsuranceConvo(speaker, text, role) {
  const panel = document.getElementById('insurance-panel');
  if(panel.querySelector('.ins-status')) panel.innerHTML = '';
  const colors = {
    hospital: {bg:'rgba(88,166,255,.08)',border:'rgba(88,166,255,.2)',label:'var(--accent)',align:'flex-start'},
    insurance: {bg:'rgba(210,153,34,.08)',border:'rgba(210,153,34,.2)',label:'var(--yellow)',align:'flex-end'},
    ivr: {bg:'rgba(255,255,255,.03)',border:'rgba(255,255,255,.05)',label:'var(--muted)',align:'center'},
  };
  const c = colors[role] || colors.ivr;
  const div = document.createElement('div');
  div.style.cssText = `display:flex;justify-content:${c.align};margin-bottom:8px;animation:fadeIn .3s ease`;
  div.innerHTML = `<div style="max-width:90%;background:${c.bg};border:1px solid ${c.border};border-radius:8px;padding:10px 12px"><div style="font-size:10px;font-weight:600;color:${c.label};margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">${speaker}</div><div style="font-size:12px;color:var(--text);line-height:1.5">${text}</div></div>`;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

function startCallTimer() {
  callSeconds = 0;
  const el = document.getElementById('call-timer');
  el.style.display = 'block';
  callTimer = setInterval(() => {
    callSeconds++;
    const m = String(Math.floor(callSeconds/60)).padStart(2,'0');
    const s = String(callSeconds%60).padStart(2,'0');
    el.textContent = m+':'+s;
  }, 1000);
}
function stopCallTimer() { clearInterval(callTimer); }

// ── Services ──────────────────────────────────────────────────────────────
const services = [
  {name:'Graph', url:`${GRAPH_URL}/graph/stats`, check:d=>d.documents+' patients'},
  {name:'Agent', url:`${AGENT_URL}/health`,      check:d=>d.status},
  {name:'Insur', url:`${INS_URL}/health`,        check:d=>d.status},
];
async function checkServices() {
  const el = document.getElementById('service-pills');
  const pills = [];
  for(const s of services) {
    try {
      const r = await fetch(s.url); const d = await r.json();
      pills.push(`<div class="service-pill"><div class="dot"></div>${s.name}: ${s.check(d)}</div>`);
    } catch {
      pills.push(`<div class="service-pill"><div class="dot off"></div>${s.name}: offline</div>`);
    }
  }
  el.innerHTML = pills.join('');
}

// ── Patient list ───────────────────────────────────────────────────────────
function renderPatients() {
  document.getElementById('patient-list').innerHTML = DEMO_PATIENTS.map((p,i) => `
    <div class="patient-card" id="pc-${i}" onclick="loadDemoPatient(${i})">
      <div class="p-name">${p.name}</div>
      <div class="p-meta">DOB: ${p.dob} · ${p.insurance}</div>
      <div style="font-size:11px;color:var(--accent);margin-bottom:6px;font-style:italic">${p.details.phone_script}</div>
      <div class="tags">
        <span class="tag tag-blue">${p.insurance}</span>
        <span class="tag tag-red">${p.denied} denied</span>
        <span class="tag tag-purple">${p.scenario}</span>
      </div>
    </div>
  `).join('') + `
    <div style="margin-top:16px;padding:12px;background:var(--card);border:1px solid rgba(88,166,255,.2);border-radius:8px">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">📞 Real Phone Call</div>
      <div style="font-size:14px;color:var(--accent);font-weight:700;margin-bottom:4px">+1 (531) 324-5471</div>
      <div style="font-size:11px;color:var(--muted)">Call this number — dashboard updates live as you speak</div>
    </div>
  `;
}

function now() { return new Date().toLocaleTimeString(); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Init ──────────────────────────────────────────────────────────────────
renderPatients();
checkServices();
setInterval(checkServices, 15000);
connectWS();
</script>
</body>
</html>
