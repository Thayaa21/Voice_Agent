<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Voice AI — Live Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
.header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 600; color: #fff; }
.header .badge { background: #10b981; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.layout { display: grid; grid-template-columns: 320px 1fr; gap: 0; height: calc(100vh - 57px); }
.sidebar { background: #1a1d2e; border-right: 1px solid #2d3748; overflow-y: auto; padding: 16px; }
.sidebar h2 { font-size: 12px; font-weight: 600; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.patient-card { background: #242838; border: 1px solid #2d3748; border-radius: 8px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
.patient-card:hover { border-color: #4299e1; background: #2a3045; }
.patient-card.active { border-color: #4299e1; background: #1e3a5f; }
.patient-name { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.patient-meta { font-size: 12px; color: #718096; margin-bottom: 8px; }
.patient-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
.tag.denied { background: #4a1a1a; color: #fc8181; }
.tag.insurance { background: #1a2a4a; color: #63b3ed; }
.tag.conditions { background: #1a3a2a; color: #68d391; }
.main { overflow-y: auto; padding: 20px; }
.section { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 10px; margin-bottom: 16px; }
.section-header { padding: 14px 18px; border-bottom: 1px solid #2d3748; display: flex; align-items: center; justify-content: space-between; }
.section-title { font-size: 13px; font-weight: 600; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.05em; }
.section-body { padding: 18px; }
</style>
</head>
<body>

<div class="header">
  <div class="status-dot"></div>
  <h1>Hospital Voice AI — Live Dashboard</h1>
  <span class="badge">LIVE</span>
  <div style="margin-left:auto;font-size:12px;color:#718096" id="service-status">Checking services...</div>
</div>

<div class="layout">
  <div class="sidebar">
    <h2>Demo Patients</h2>
    <div id="patient-list"></div>
    <div style="margin-top:20px">
      <h2>System Status</h2>
      <div id="sys-status"></div>
    </div>
  </div>
  <div class="main">
    <div id="patient-detail">
      <div style="text-align:center;padding:60px;color:#718096">
        <div style="font-size:48px;margin-bottom:16px">🏥</div>
        <div style="font-size:16px;font-weight:600;color:#a0aec0">Select a demo patient to test</div>
        <div style="font-size:13px;margin-top:8px">Click a patient on the left to run all 4 use cases</div>
      </div>
    </div>
  </div>
</div>

<script>
const AGENT_URL   = 'http://localhost:9001';
const GRAPH_URL   = 'http://localhost:8000';
const VOICE_URL   = 'http://localhost:8001';
const INS_URL     = 'http://localhost:8002';

const DEMO_PATIENTS = [
  { name: 'Sydney Santos',  scenario: 'Claim Denial',    insurance: 'Anthem',   dob:'1999-05-24' },
  { name: 'Dylan Ali',      scenario: 'Cost Estimate',   insurance: 'Medicare', dob:'1940-04-12' },
  { name: 'Grace Collins',  scenario: 'Pre-Procedure',   insurance: 'Medicare', dob:'1938-09-05' },
];

const QUERIES = [
  { label: '1. Identify Patient',    text: (name) => name,                           endpoint: null,            icon: '👤' },
  { label: '2. Claim Status',        text: (name) => 'why was my claim denied',       endpoint: 'claim-status',  icon: '🚫' },
  { label: '3. Cost Estimate',       text: (name) => 'how much do I owe',             endpoint: 'cost-estimate', icon: '💰' },
  { label: '4. Pre-Procedure Prep',  text: (name) => 'what do I do before my procedure', endpoint: 'pre-procedure', icon: '📋' },
  { label: '5. Bill Explanation',    text: (name) => 'I got a bill and I dont understand', endpoint: 'bill-explanation', icon: '🧾' },
];

// Render patient list
function renderPatients() {
  const el = document.getElementById('patient-list');
  el.innerHTML = DEMO_PATIENTS.map((p, i) => `
    <div class="patient-card" onclick="loadPatient(${i})" id="pc-${i}">
      <div class="patient-name">${p.name}</div>
      <div class="patient-meta">DOB: ${p.dob}</div>
      <div class="patient-tags">
        <span class="tag insurance">${p.insurance}</span>
        <span class="tag denied">Demo: ${p.scenario}</span>
      </div>
    </div>
  `).join('');
}

// Check service health
async function checkServices() {
  const services = [
    { name: 'Graph',     url: `${GRAPH_URL}/graph/stats`,  key: 'documents' },
    { name: 'Agent',     url: `${AGENT_URL}/health`,       key: 'status' },
    { name: 'Insurance', url: `${INS_URL}/health`,         key: 'status' },
    { name: 'Voice',     url: `${VOICE_URL}/health`,       key: 'status' },
  ];
  const el = document.getElementById('sys-status');
  const statusEl = document.getElementById('service-status');
  const results = [];
  for (const s of services) {
    try {
      const r = await fetch(s.url);
      const d = await r.json();
      const ok = s.key === 'documents' ? `${d.documents} patients` : d.status;
      results.push(`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2d3748;font-size:12px"><span style="color:#a0aec0">${s.name}</span><span style="color:#10b981">● ${ok}</span></div>`);
    } catch {
      results.push(`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2d3748;font-size:12px"><span style="color:#a0aec0">${s.name}</span><span style="color:#fc8181">● offline</span></div>`);
    }
  }
  el.innerHTML = results.join('');
  statusEl.textContent = 'All services running';
}
</script>

<script>
let callId = null;

async function loadPatient(idx) {
  document.querySelectorAll('.patient-card').forEach(c => c.classList.remove('active'));
  document.getElementById('pc-' + idx).classList.add('active');
  const p = DEMO_PATIENTS[idx];
  callId = 'demo_' + Date.now();

  const detail = document.getElementById('patient-detail');
  detail.innerHTML = `
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div style="width:48px;height:48px;background:#1e3a5f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px">👤</div>
        <div>
          <div style="font-size:20px;font-weight:700;color:#fff">${p.name}</div>
          <div style="font-size:13px;color:#718096">${p.insurance} · DOB: ${p.dob} · Session: ${callId}</div>
        </div>
        <button onclick="runAllTests(${idx})" style="margin-left:auto;background:#4299e1;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">▶ Run All Tests</button>
      </div>
    </div>
    <div id="test-results"></div>
  `;

  // Auto-load patient data
  runAllTests(idx);
}

async function runAllTests(idx) {
  const p = DEMO_PATIENTS[idx];
  callId = 'demo_' + Date.now();
  const container = document.getElementById('test-results');
  container.innerHTML = '';

  for (const q of QUERIES) {
    const card = document.createElement('div');
    card.className = 'section';
    card.innerHTML = `
      <div class="section-header">
        <span class="section-title">${q.icon} ${q.label}</span>
        <span id="status-${q.label.replace(/\s/g,'_')}" style="font-size:12px;color:#718096">Running...</span>
      </div>
      <div class="section-body" id="result-${q.label.replace(/\s/g,'_')}">
        <div style="color:#718096;font-size:13px">⏳ Processing...</div>
      </div>
    `;
    container.appendChild(card);

    const t0 = Date.now();
    try {
      let response, source;
      if (q.endpoint) {
        // Direct hospital endpoint
        const r = await fetch(`${GRAPH_URL}/hospital/${q.endpoint}`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({patient_name: p.name})
        });
        const d = await r.json();
        response = d.answer || d.response || JSON.stringify(d);
        source = `Graph endpoint: /hospital/${q.endpoint}`;
      } else {
        // Agent conversation
        const r = await fetch(`${AGENT_URL}/agent`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text: q.text(p.name), call_id: callId})
        });
        const d = await r.json();
        response = d.response;
        source = 'Agent conversation';
      }

      const ms = Date.now() - t0;
      const statusEl = document.getElementById(`status-${q.label.replace(/\s/g,'_')}`);
      statusEl.innerHTML = `<span style="color:#10b981">✓ ${ms}ms</span>`;
      document.getElementById(`result-${q.label.replace(/\s/g,'_')}`).innerHTML = `
        <div style="font-size:14px;color:#e2e8f0;line-height:1.6;margin-bottom:10px">${response}</div>
        <div style="font-size:11px;color:#4a5568;border-top:1px solid #2d3748;padding-top:8px">${source}</div>
      `;
    } catch(e) {
      document.getElementById(`status-${q.label.replace(/\s/g,'_')}`).innerHTML = `<span style="color:#fc8181">✗ Error</span>`;
      document.getElementById(`result-${q.label.replace(/\s/g,'_')}`).innerHTML = `<div style="color:#fc8181;font-size:13px">${e.message}</div>`;
    }
  }

  // Add 3-phase resolution section
  const phaseCard = document.createElement('div');
  phaseCard.className = 'section';
  phaseCard.innerHTML = `
    <div class="section-header">
      <span class="section-title">🔄 3-Phase Insurance Resolution</span>
      <button onclick="runThreePhase('${p.name}')" style="background:#805ad5;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px">Run 3-Phase Flow</button>
    </div>
    <div class="section-body" id="three-phase-result">
      <div style="color:#718096;font-size:13px">Click "Run 3-Phase Flow" to simulate: Patient call → AI calls insurance → AI calls patient back</div>
    </div>
  `;
  container.appendChild(phaseCard);
}

async function runThreePhase(patientName) {
  const el = document.getElementById('three-phase-result');
  el.innerHTML = renderPhase('Phase 1', 'Patient called hospital', '✅', 'Patient identified. Inquiry collected. Told: "I\'ll call you back in 15 minutes."') +
                 renderPhase('Phase 2', 'AI calling insurance company...', '⏳', '');

  try {
    const r = await fetch(`${AGENT_URL}/resolve/sync`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        patient_name: patientName,
        inquiry_type: 'claim_status',
        callback_number: '+15313245471',
        call_id: 'dashboard_' + Date.now()
      })
    });
    const d = await r.json();
    el.innerHTML =
      renderPhase('Phase 1', 'Patient called hospital', '✅', `Patient "${patientName}" identified. Inquiry: claim status. Callback promised.`) +
      renderPhase('Phase 2', 'AI called Pacific Shield Insurance', '✅', `Insurance agent response: "${d.insurance_response ? d.insurance_response.substring(0,200) + '...' : 'Received denial details'}" · Claim status: ${d.claim_status}`) +
      renderPhase('Phase 3', 'AI called patient back', d.callback_result?.status === 'initiated' ? '✅' : '⚠️',
        d.callback_result?.status === 'initiated'
          ? `Outbound call initiated. CallSid: ${d.callback_result.call_sid}<br><br><strong>Callback message:</strong><br>${d.callback_message ? d.callback_message.substring(0,300) + '...' : ''}`
          : `Callback logged: ${d.callback_message ? d.callback_message.substring(0,200) + '...' : ''}`);
  } catch(e) {
    el.innerHTML += `<div style="color:#fc8181;padding:12px">Error: ${e.message}</div>`;
  }
}

function renderPhase(phase, title, status, detail) {
  const color = status === '✅' ? '#10b981' : status === '⏳' ? '#f6ad55' : '#fc8181';
  return `
    <div style="display:flex;gap:16px;padding:14px 0;border-bottom:1px solid #2d3748">
      <div style="font-size:20px;width:28px">${status}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:4px">${phase}: ${title}</div>
        ${detail ? `<div style="font-size:12px;color:#a0aec0;line-height:1.5">${detail}</div>` : ''}
      </div>
    </div>
  `;
}

// Init
renderPatients();
checkServices();
setInterval(checkServices, 10000);
</script>
</body>
</html>
